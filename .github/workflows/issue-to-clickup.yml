name: Sync GitHub Issues to ClickUp

on:
  issues:
    types: [opened, labeled]

jobs:
  sync-to-clickup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Create ClickUp Task from Issue
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_BACKLOG_LIST_ID: ${{ secrets.CLICKUP_BACKLOG_LIST_ID }}
          CLICKUP_DEV_LIST_ID: ${{ secrets.CLICKUP_DEV_LIST_ID }}
          CLICKUP_DISCUSSION_LIST_ID: ${{ secrets.CLICKUP_DISCUSSION_LIST_ID }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        run: node scripts/sync/issue-to-clickup.js
