name: Daily RN/Expo News Scanner

on:
  schedule:
    # Every day at 08:00 UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Manual trigger

permissions:
  issues: write

jobs:
  scan-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Scan RN/Expo News
        env:
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          CLICKUP_LIST_ID: ${{ secrets.CLICKUP_RN_NEWS_LIST_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/daily-news/scan-rn-expo.js

      - name: Summary
        if: always()
        run: echo "RN/Expo news scan completed at $(date -u)"
