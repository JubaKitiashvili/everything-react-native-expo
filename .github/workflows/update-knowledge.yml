name: Update Knowledge Base

on:
  schedule:
    # Every Sunday at 06:00 UTC
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no file changes)'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

jobs:
  check-updates:
    runs-on: ubuntu-latest
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check for new releases
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/update-knowledge.mjs --check-only

  update-rules:
    needs: check-updates
    if: needs.check-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Update knowledge base
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/update-knowledge.mjs --dry-run
          else
            node scripts/update-knowledge.mjs
          fi

      - name: Create Pull Request
        if: inputs.dry_run != true
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'chore: update Expo/RN knowledge base'
          title: 'chore: auto-update Expo/RN knowledge base'
          body: |
            ## Automated Knowledge Update

            New Expo SDK or React Native versions were detected. This PR updates
            `.claude/rules/` files to reflect the latest APIs, deprecations, and
            best practices.

            **Review carefully** — changes are AI-generated from official changelogs.

            ---
            Generated by ERNE Knowledge Updater
          branch: chore/update-knowledge
          delete-branch: true
          labels: |
            documentation
            automated
