<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- ============================================ -->
  <!-- ERNE Favicon SVG                              -->
  <!-- Heavily simplified for 16-32px rendering     -->
  <!-- Bold strokes, no blur, no electrons/stars     -->
  <!-- ============================================ -->

  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0d1f3c"/>
      <stop offset="100%" stop-color="#030810"/>
    </radialGradient>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44ff88"/>
      <stop offset="100%" stop-color="#ffaa22"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#88ddff"/>
      <stop offset="100%" stop-color="#4488ff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>

  <!-- Orbit 1 — Blue (horizontal-ish) -->
  <ellipse cx="32" cy="32" rx="28" ry="9"
    transform="rotate(-10 32 32)"
    fill="none" stroke="#00aaff" stroke-width="2.5" opacity="0.9"/>

  <!-- Orbit 2 — Purple (diagonal ~60 degrees) -->
  <ellipse cx="32" cy="32" rx="28" ry="9"
    transform="rotate(60 32 32)"
    fill="none" stroke="#cc44ff" stroke-width="2.5" opacity="0.9"/>

  <!-- Orbit 3 — Green/Gold (diagonal ~-50 degrees) -->
  <ellipse cx="32" cy="32" rx="28" ry="8"
    transform="rotate(-50 32 32)"
    fill="none" stroke="url(#gg)" stroke-width="2.5" opacity="0.9"/>

  <!-- Core nucleus -->
  <circle cx="32" cy="32" r="7" fill="url(#core)" opacity="0.9"/>
  <circle cx="32" cy="32" r="3.5" fill="#ffffff" opacity="1.0"/>

</svg>
