<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERNE Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-layout" id="layout">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="dashboard"></canvas>
    </div>
    <!-- Panel, stats bar, toasts, and overlay are created by JS modules -->
  </div>

  <script src="canvas.js"></script>
  <script src="agents.js"></script>
  <script src="history.js"></script>
  <script src="panel.js"></script>
  <script src="overlay.js"></script>
  <script src="toasts.js"></script>
  <script src="statsbar.js"></script>
  <script src="ws-client.js"></script>
  <script>
    (function () {
      'use strict';

      var CANVAS_W = OfficeCanvas.CANVAS_W;
      var CANVAS_H = OfficeCanvas.CANVAS_H;

      var canvas = document.getElementById('dashboard');
      var ctx = canvas.getContext('2d');
      var layout = document.getElementById('layout');

      canvas.width = CANVAS_W;
      canvas.height = CANVAS_H;

      var resizeCanvas = function () {
        var containerEl = document.getElementById('canvasContainer');
        var cw = containerEl.clientWidth;
        var ch = containerEl.clientHeight;
        var scaleX = cw / CANVAS_W;
        var scaleY = ch / CANVAS_H;
        var scale = Math.min(scaleX, scaleY, 2);
        canvas.style.width = Math.floor(CANVAS_W * scale) + 'px';
        canvas.style.height = Math.floor(CANVAS_H * scale) + 'px';
      };

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // Init modules
      AgentSprites.initAgentSprites();
      Panel.init(layout, function onAgentClick(agentName) {
        Overlay.open(agentName, agentServerState);
      });
      Overlay.init(document.body);
      Toasts.init();
      StatsBar.init(layout);

      // Re-size canvas after panel is added (takes space from bottom)
      resizeCanvas();

      // Canvas click → agent detection
      canvas.addEventListener('click', function (e) {
        var rect = canvas.getBoundingClientRect();
        var sx = CANVAS_W / rect.width;
        var sy = CANVAS_H / rect.height;
        var cx = (e.clientX - rect.left) * sx;
        var cy = (e.clientY - rect.top) * sy;
        var agent = OfficeCanvas.getAgentAtPoint(cx, cy);
        if (agent) {
          Overlay.open(agent, agentServerState);
        }
      });

      // State tracking
      var agentServerState = {};
      var prevStatuses = {};

      WSClient.createWSClient(
        function onStateUpdate(agents) {
          agentServerState = agents;

          // Detect status changes for toasts
          for (var name in agents) {
            if (!agents.hasOwnProperty(name)) continue;
            var newStatus = agents[name].status || 'idle';
            var oldStatus = prevStatuses[name] || 'idle';

            if (newStatus !== oldStatus) {
              if (newStatus === 'done') {
                Toasts.show(name, agents[name].task, 'complete');
              } else if (newStatus === 'working' && oldStatus !== 'planning') {
                Toasts.show(name, agents[name].task, 'start');
              }
            }
            prevStatuses[name] = newStatus;
          }

          // Track planning task for whiteboard
          var planTask = null;
          for (var n in agents) {
            if (agents[n].status === 'planning') {
              planTask = agents[n].task;
              break;
            }
          }
          OfficeCanvas.setPlanningTask(planTask);

          // Sync sprites
          for (var name in agents) {
            if (agents.hasOwnProperty(name)) {
              var status = agents[name].status || 'idle';
              if (AgentSprites.agentSprites[name] &&
                  AgentSprites.agentSprites[name].status !== status) {
                AgentSprites.updateAgentState(name, status);
              }
            }
          }

          // Pass task data to sprites for thought bubbles
          AgentSprites.setAgentTasks(agents);

          // Update HTML modules
          Panel.update(agents);
          Overlay.updateState(agents);
          StatsBar.update(agents);
        },
        function onConnectionChange(connected) {
          Panel.setConnected(connected);
        },
        function onHistoryUpdate(history) {
          History.setHistory(history);
        }
      );

      // Main render loop
      var lastTime = performance.now();

      var render = function (now) {
        var dt = (now - lastTime) / 1000;
        lastTime = now;
        if (dt > 0.1) dt = 0.1;

        AgentSprites.updateAgentSprites(dt);

        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        OfficeCanvas.drawOffice(ctx, agentServerState);
        AgentSprites.drawAgentSprites(ctx);

        requestAnimationFrame(render);
      };

      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
