<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERNE Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="dashboard-layout" id="layout">
    <div class="canvas-container" id="canvasContainer">
      <canvas id="dashboard"></canvas>
    </div>
    <div class="tab-content" id="tabContent" style="display:none"></div>
    <!-- Panel, stats bar, toasts, and overlay are created by JS modules -->
  </div>

  <!-- Sidebar toggle button -->
  <button class="sidebar-toggle" id="sidebarToggle" title="Toggle Context Panel">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="15 18 9 12 15 6"></polyline>
    </svg>
  </button>

  <!-- Context sidebar (hidden by default) -->
  <div id="context-sidebar" class="ctx-sidebar">
    <div id="system-info-panel" class="ctx-panel"></div>
    <div id="audit-panel" class="ctx-panel"></div>
    <div id="agent-activity-panel" class="ctx-panel"></div>
    <div id="context-toggle-panel" class="ctx-panel" style="display:none"></div>
    <div id="context-stats" class="ctx-panel" style="display:none"></div>
    <div id="context-timeline" class="ctx-panel" style="display:none"></div>
    <div id="knowledge-browser" class="ctx-panel" style="display:none"></div>
    <div id="budget-panel" class="ctx-panel" style="display:none"></div>
  </div>

  <script src="canvas.js"></script>
  <script src="agents.js"></script>
  <script src="history.js"></script>
  <script src="panel.js"></script>
  <script src="overlay.js"></script>
  <script src="toasts.js"></script>
  <script src="statsbar.js"></script>
  <script src="ws-client.js"></script>
  <script src="context-panel.js"></script>
  <script src="knowledge-browser.js"></script>
  <script src="budget-panel.js"></script>
  <script src="audit-panel.js"></script>
  <script src="context-toggle.js"></script>
  <script src="sidebar-panels.js"></script>
  <script src="tabs.js"></script>
  <script src="sparkline.js"></script>
  <script src="ecosystem-tab.js"></script>
  <script src="myapp-tab.js"></script>
  <script src="insights-tab.js"></script>
  <script src="upgrades-tab.js"></script>

  <script>
    (function () {
      'use strict';

      var CANVAS_W = OfficeCanvas.CANVAS_W;
      var CANVAS_H = OfficeCanvas.CANVAS_H;

      var canvas = document.getElementById('dashboard');
      var ctx = canvas.getContext('2d');
      var layout = document.getElementById('layout');

      canvas.width = CANVAS_W;
      canvas.height = CANVAS_H;

      var resizeCanvas = function () {
        var containerEl = document.getElementById('canvasContainer');
        var cw = containerEl.clientWidth;
        var ch = containerEl.clientHeight;
        var scaleX = cw / CANVAS_W;
        var scaleY = ch / CANVAS_H;
        var scale = Math.min(scaleX, scaleY, 2);
        canvas.style.width = Math.floor(CANVAS_W * scale) + 'px';
        canvas.style.height = Math.floor(CANVAS_H * scale) + 'px';
      };

      window.addEventListener('resize', resizeCanvas);
      resizeCanvas();

      // ── Sidebar toggle ──
      var sidebar = document.getElementById('context-sidebar');
      var toggleBtn = document.getElementById('sidebarToggle');
      var sidebarOpen = false;

      toggleBtn.addEventListener('click', function () {
        sidebarOpen = !sidebarOpen;
        sidebar.classList.toggle('open', sidebarOpen);
        toggleBtn.classList.toggle('open', sidebarOpen);
        layout.classList.toggle('sidebar-open', sidebarOpen);
        // Re-fit canvas after layout shift
        setTimeout(resizeCanvas, 300);
      });

      // Init modules
      AgentSprites.initAgentSprites();
      Panel.init(layout, function onAgentClick(agentName) {
        Overlay.open(agentName, agentServerState);
      });
      Overlay.init(document.body);
      Toasts.init();
      StatsBar.init(layout);
      Tabs.init(layout);

      // Re-size canvas after panel is added
      resizeCanvas();

      // ── Collapsible sidebar panels ──
      function initCollapsiblePanels() {
        var panels = document.querySelectorAll('.ctx-panel');
        panels.forEach(function (panel) {
          var wrapped = false;
          var observer = new MutationObserver(function () {
            if (wrapped) return;
            var h3 = panel.querySelector('h3');
            if (!h3) return;

            // Only wrap once
            wrapped = true;
            observer.disconnect();

            var header = document.createElement('div');
            header.className = 'ctx-panel-header';
            var chevron = document.createElement('span');
            chevron.className = 'ctx-panel-chevron';
            chevron.innerHTML = '&#9660;';

            h3.parentNode.insertBefore(header, h3);
            header.appendChild(h3);
            header.appendChild(chevron);

            var body = document.createElement('div');
            body.className = 'ctx-panel-body';
            while (header.nextSibling) {
              body.appendChild(header.nextSibling);
            }
            panel.appendChild(body);

            header.addEventListener('click', function () {
              var isCollapsed = body.classList.toggle('collapsed');
              chevron.classList.toggle('collapsed', isCollapsed);
            });
          });
          observer.observe(panel, { childList: true, subtree: true });
        });
      }
      initCollapsiblePanels();

      // Canvas click -> agent detection
      canvas.addEventListener('click', function (e) {
        var rect = canvas.getBoundingClientRect();
        var sx = CANVAS_W / rect.width;
        var sy = CANVAS_H / rect.height;
        var cx = (e.clientX - rect.left) * sx;
        var cy = (e.clientY - rect.top) * sy;
        var agent = OfficeCanvas.getAgentAtPoint(cx, cy);
        if (agent) {
          Overlay.open(agent, agentServerState);
        }
      });

      // State tracking
      var agentServerState = {};
      var prevStatuses = {};

      WSClient.createWSClient(
        function onStateUpdate(agents) {
          agentServerState = agents;

          // Detect status changes for toasts
          for (var name in agents) {
            if (!agents.hasOwnProperty(name)) continue;
            var newStatus = agents[name].status || 'idle';
            var oldStatus = prevStatuses[name] || 'idle';

            if (newStatus !== oldStatus) {
              if (newStatus === 'done') {
                Toasts.show(name, agents[name].task, 'complete');
              } else if (newStatus === 'working' && oldStatus !== 'planning') {
                Toasts.show(name, agents[name].task, 'start');
              }
            }
            prevStatuses[name] = newStatus;
          }

          // Track planning task for whiteboard
          var planTask = null;
          for (var n in agents) {
            if (agents[n].status === 'planning') {
              planTask = agents[n].task;
              break;
            }
          }
          OfficeCanvas.setPlanningTask(planTask);

          // Sync sprites
          for (var name in agents) {
            if (agents.hasOwnProperty(name)) {
              var status = agents[name].status || 'idle';
              if (AgentSprites.agentSprites[name] &&
                  AgentSprites.agentSprites[name].status !== status) {
                AgentSprites.updateAgentState(name, status);
              }
            }
          }

          // Pass task data to sprites for thought bubbles
          AgentSprites.setAgentTasks(agents);

          // Update HTML modules
          Panel.update(agents);
          Overlay.updateState(agents);
          StatsBar.update(agents);
          Tabs.updateNavStats(agents);
        },
        function onConnectionChange(connected) {
          Panel.setConnected(connected);
          Tabs.setNavConnected(connected);
        },
        function onHistoryUpdate(history) {
          History.setHistory(history);
        },
        function onBadgeUpdate(tabName, count) { Tabs.setBadge(tabName, count); }
      );

      // Main render loop
      var lastTime = performance.now();

      var render = function (now) {
        var dt = (now - lastTime) / 1000;
        lastTime = now;
        if (dt > 0.1) dt = 0.1;

        AgentSprites.updateAgentSprites(dt);

        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        OfficeCanvas.drawOffice(ctx, agentServerState);
        AgentSprites.drawAgentSprites(ctx);

        requestAnimationFrame(render);
      };

      requestAnimationFrame(render);
    })();
  </script>
</body>
</html>
